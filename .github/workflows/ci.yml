name: code-quality

# The code-quality loop: lint + format-check + tests on every push and PR.
# Mirrors `make check` so a green tick here == a green `make check` locally.
# This is the gate the `shipping-changes` skill's "verify what's verifiable" step relies on.

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip

      # The hermetic unit + behavioral-check suite only exercises these deps at runtime
      # (torch: device-detection tests; faker: negatives generator). The heavy training
      # stack (unsloth/transformers/peft/trl) is imported lazily and only in the GPU smoke
      # loop, which CI does not run — so we install the CPU torch wheel and skip the rest.
      # If a new test starts importing another runtime dep, add it here.
      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install "ruff>=0.6" "pytest>=8.2" faker
          pip install "torch>=2.3" --index-url https://download.pytorch.org/whl/cpu

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format --check)
        run: ruff format --check .

      - name: Tests (pytest)
        env:
          PYTORCH_ENABLE_MPS_FALLBACK: "1"
        run: pytest
