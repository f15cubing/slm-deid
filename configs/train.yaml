# QLoRA training config — Colab/CUDA (4-bit QLoRA via unsloth). Mac/MPS counterpart is
# configs/train.mps.bf16.yaml. LoRA hyperparameters are IDENTICAL across both backends so
# base-vs-tuned stays comparable (frozen since Day 4: fix data, not hyperparameters).
# NOTE: this path 4-bit-quantizes the base, so its base-vs-tuned numbers RE-BASELINE vs the Mac
# bf16 runs (v2/v3) — report Colab numbers as their own line, don't reuse the MPS ones.
# Used by notebooks/colab_v3_qlora.ipynb to reproduce v3 on Colab. Override --output-dir per run.
base_model: unsloth/Qwen3-1.7B-unsloth-bnb-4bit
max_seq_len: 2048

# LoRA
lora_r: 32
lora_alpha: 32
lora_dropout: 0.0
target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

# Optimization
learning_rate: 2.0e-4
num_train_epochs: 3
per_device_train_batch_size: 8
gradient_accumulation_steps: 2
warmup_ratio: 0.05
lr_scheduler_type: linear
weight_decay: 0.01
seed: 0

# Data / masking
train_path: data/splits/train.jsonl
val_path: data/splits/val.jsonl
completion_only: true      # mask the prompt; loss only on the tagged completion
enable_thinking: false

output_dir: outputs/sft-v3-colab   # override per run with --output-dir
