# QLoRA training config (Day 3 real run; Day 2 smoke uses --smoke overrides).
# Frozen on Day 4 (fix data, not hyperparameters) — prove it with a diff.
base_model: unsloth/Qwen3-1.7B-unsloth-bnb-4bit
max_seq_len: 2048

# LoRA
lora_r: 32
lora_alpha: 32
lora_dropout: 0.0
target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

# Optimization
learning_rate: 2.0e-4
num_train_epochs: 3
per_device_train_batch_size: 8
gradient_accumulation_steps: 2
warmup_ratio: 0.05
lr_scheduler_type: linear
weight_decay: 0.01
seed: 0

# Data / masking
train_path: data/splits/train.jsonl
val_path: data/splits/val.jsonl
completion_only: true      # mask the prompt; loss only on the tagged completion
enable_thinking: false

output_dir: outputs/sft-v1
