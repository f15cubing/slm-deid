# Data-gen config — Day-4 TARGETED recipe (data-iteration day).
#
# Goal: fix the Day-3 over-tagging (base->tuned over_tag 0.10->0.37) by teaching the model to
# WITHHOLD on non-person uses of ambiguous tokens. The bulk is now MATCHED MINIMAL PAIRS (the
# same surface used once as a person [tagged] and once as a non-person [untagged]) — the contrast
# the Day-3 data entirely lacked (person_vs_place had 0 train examples, person_vs_common 4,
# possessive 1). Tokens come from the curated, eval-DISJOINT bank in src/datagen/vocab.py, so this
# stays a clean generalization test (see docs/error-analysis-v1.md).
#
# `scale` multiplies every count below — the ONE knob to size the run. v3 scale-up: the recipe is
# the balanced per-batch unit; the larger set is built by running 1-2 batches (distinct --seed,
# --temperature 0.8) and merging with the CRAPII real slice. Minimal pairs are 50/50
# person/non-person by construction — leaning on them (over the withhold-only negatives) is what
# rebalances person_vs_common toward person-use and recovers recall/consistency (v2 was 18 tag / 38
# withhold there). CRAPII is folded in at MERGE time (not here) so it is added exactly once.
# Run (v3 was built with the in-session authored teacher, teacher API being down):
#   python -m src.datagen.generate --config configs/datagen.yaml --provider authored --seed 1 --out-dir data/_b1
# (`--provider openai/anthropic` also work when a teacher key is available.)
scale: 2.0

# --- matched minimal pairs (each entry = number of PAIRS; each pair -> 2 examples) --------
# Weighted toward the weakest categories. `person_vs_common` is bumped hardest (the recall/
# consistency regression); `possessive` up to counter its v2 collapse (n=1). Pairs draw from the
# expanded eval-disjoint bank (vocab.py: 43 common / 32 places / 35 eponyms) so the model learns
# the person-vs-non-person contrast over MANY surfaces rather than memorizing a handful.
minimal_pairs:
  person_vs_common: 70
  person_vs_place: 55
  possessive: 45
  person_vs_eponym: 30

# --- teacher single passages per category (register/context variety beyond the pairs) -----
# negative_trap trimmed (it only adds withhold examples, which biased v2). No person_vs_* singles
# here — those are covered by the balanced minimal pairs above (controlled token + semantics gate).
category_counts:
  negative_trap: 25
  first_name_only: 24
  third_party: 20
  easy: 14

negatives: 25        # Faker pattern-type negatives (emails/phones/IDs untagged; pure = negative_trap)
seed: 0
val_frac: 0.1
out_dir: data
eval_dir: eval       # used ONLY for the leakage guards (token + passage); never read as training data

# --- real slice (CRAPII) — folded in at MERGE time, not during generate -----------------
# Left null here so each generate batch is pure synthetic (avoids folding CRAPII once per batch);
# merge.py adds it exactly once via --crapii/--crapii-limit (v3 used --crapii-limit 150). Routed
# through the SAME quality gate + leakage guards. NAME_STUDENT under-tags non-student names (see
# src/datagen/real_data.py caveat). The two crapii_* keys below are UNUSED while crapii_path is null
# (generate never reads CRAPII); kept only as documentation of the merge-time defaults.
crapii_path: null
crapii_limit: 150
crapii_max_chars: 3000
