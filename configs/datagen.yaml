# Data-gen config. Day-3 v1 sizing: ~300 teacher examples, time-boxed to keep the full
# generate->train->eval loop under ~2h on local MPS. Weighted toward the hard ambiguous NAME
# categories (the crux). Scale toward 800-2,000 on Day 4 (data-iteration day).
category_counts:
  person_vs_eponym: 55
  person_vs_place: 55
  person_vs_common: 55
  first_name_only: 33
  possessive: 33
  third_party: 33
  negative_trap: 22
  easy: 16
negatives: 50        # Faker pattern-type negatives (emails/phones/IDs untagged)
seed: 0
val_frac: 0.1
out_dir: data
eval_dir: eval       # used only for the leakage filter; never read as training data
